<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    
    {{/* --- Google Font Import --- */}}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    {{/* --- Main Stylesheet --- */}}
    {{ $style := resources.Get "scss/main.scss" | toCSS }}
    <link href="{{ $style.RelPermalink }}" rel="stylesheet">

    {{/* --- [NEW] Pagefind Search --- */}}
    {{/* These files will be generated by the build.sh script */}}
    <link href="/pagefind/pagefind-ui.css" rel="stylesheet">
    <script src="/pagefind/pagefind-ui.js" defer></script>
    <script>
      /* * This inline script initializes Pagefind.
       * [Ref: Project Context 14, 15]
       * Analysis: Safe. No user input.
       * Hooks Pagefind to our <div id="search">
       */
      window.addEventListener('DOMContentLoaded', (event) => {
        new PagefindUI({ 
          element: "#search",
          showSubResults: true,
          showEmptyFilters: false
        });
      });
    </script>
</head>
